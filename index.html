<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Readiness Learning Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; }
    .card-hover { transition: all 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .badge { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="text-gray-100">
  <div class="max-w-5xl mx-auto px-4 py-12">
    <!-- Header -->
    <div class="text-center mb-12">
      <h1 class="text-4xl md:text-5xl font-bold mb-4 bg-gradient-to-r from-blue-400 via-cyan-400 to-emerald-400 bg-clip-text text-transparent">
        🎯 Readiness Learning Hub
      </h1>
      <p class="text-lg text-slate-400 max-w-2xl mx-auto">
        Master Windows technologies through structured learning, scenario-based quizzes, and hands-on case simulations
      </p>
    </div>

    <!-- Topic Cards -->
    <div id="topics-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Populated by JS -->
    </div>

    <div id="loading" class="text-center py-20 text-slate-500">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-2 border-blue-400 border-t-transparent mb-4"></div>
      <p>Loading topics...</p>
    </div>
  </div>

  <script>
    (function() {
      var grid = document.getElementById('topics-grid');
      var loading = document.getElementById('loading');

      fetch('data/topics/index.json')
        .then(function(r) { return r.json(); })
        .then(function(topics) {
          // Load per-topic manifests for estimated time
          var promises = topics.map(function(t) {
            return fetch('data/topics/' + t.id + '/topic.json')
              .then(function(r) { return r.json(); })
              .then(function(manifest) { t._manifest = manifest; return t; })
              .catch(function() { return t; });
          });
          return Promise.all(promises);
        })
        .then(function(topics) {
          loading.style.display = 'none';
          topics.forEach(function(topic) {
            var totalMin = 0;
            if (topic._manifest && topic._manifest.levels) {
              topic._manifest.levels.forEach(function(l) { totalMin += l.estimatedMinutes || 0; });
            }

            // Check localStorage for progress
            var progressKey = 'readiness:' + topic.id;
            var saved = localStorage.getItem(progressKey);
            var inProgress = localStorage.getItem(progressKey + ':progress');
            var badge = '';
            if (saved) {
              try {
                var data = JSON.parse(saved);
                if (data.completed) {
                  badge = '<span class="badge inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-500/20 text-emerald-400 border border-emerald-500/30">✅ Completed</span>';
                }
              } catch(e) {}
            } else if (inProgress) {
              badge = '<span class="badge inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-500/20 text-amber-400 border border-amber-500/30">🔄 In Progress</span>';
            }

            var card = document.createElement('a');
            card.href = 'learn.html?topic=' + topic.id;
            card.className = 'card-hover block bg-slate-800/60 backdrop-blur border border-slate-700/50 rounded-2xl p-6 cursor-pointer';
            card.innerHTML =
              '<div class="flex items-start justify-between mb-3">' +
                '<span class="text-4xl">' + (topic.title.match(/^\S+/) || [''])[0] + '</span>' +
                (badge ? '<div>' + badge + '</div>' : '') +
              '</div>' +
              '<h2 class="text-xl font-semibold text-white mb-2">' + topic.title.replace(/^\S+\s*/, '') + '</h2>' +
              '<p class="text-slate-400 text-sm mb-4 leading-relaxed">' + topic.description + '</p>' +
              '<div class="flex items-center gap-4 text-xs text-slate-500">' +
                '<span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>' + topic.levels + ' levels</span>' +
                '<span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>~' + totalMin + ' min</span>' +
              '</div>';
            grid.appendChild(card);
          });
        })
        .catch(function(err) {
          loading.innerHTML = '<p class="text-red-400">Failed to load topics. ' + err.message + '</p>';
        });
    })();
  </script>
</body>
</html>
