<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning — Readiness Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; }

    /* Markdown content styles */
    .md-content { color: #cbd5e1; line-height: 1.8; }
    .md-content h1 { font-size: 1.75rem; font-weight: 700; color: #f1f5f9; margin: 1.5rem 0 0.75rem; }
    .md-content h2 { font-size: 1.35rem; font-weight: 600; color: #e2e8f0; margin: 1.25rem 0 0.5rem; border-bottom: 1px solid #334155; padding-bottom: 0.4rem; }
    .md-content h3 { font-size: 1.1rem; font-weight: 600; color: #e2e8f0; margin: 1rem 0 0.4rem; }
    .md-content p { margin: 0.5rem 0; }
    .md-content ul, .md-content ol { margin: 0.5rem 0 0.5rem 1.5rem; }
    .md-content li { margin: 0.25rem 0; }
    .md-content strong { color: #f1f5f9; }
    .md-content a { color: #60a5fa; text-decoration: underline; }
    .md-content table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; }
    .md-content th { background: #1e293b; padding: 0.5rem; text-align: left; border: 1px solid #334155; color: #e2e8f0; font-weight: 600; }
    .md-content td { padding: 0.5rem; border: 1px solid #334155; }
    .md-content pre { background: #0f172a; border: 1px solid #334155; border-radius: 0.5rem; padding: 1rem; overflow-x: auto; margin: 0.75rem 0; }
    .md-content code { font-family: 'Consolas', 'Monaco', monospace; font-size: 0.875rem; color: #a5f3fc; }
    .md-content pre code { color: #e2e8f0; }
    .md-content blockquote { border-left: 3px solid #3b82f6; padding-left: 1rem; margin: 0.75rem 0; color: #94a3b8; }
    .md-content hr { border-color: #334155; margin: 1.5rem 0; }

    /* Quiz choice cards */
    .choice-card { transition: all 0.2s ease; cursor: pointer; }
    .choice-card:hover { border-color: #60a5fa; background: #1e293b; }
    .choice-card.selected { border-color: #3b82f6; background: #1e3a5f; }
    .choice-card.correct { border-color: #22c55e; background: rgba(34,197,94,0.1); }
    .choice-card.incorrect { border-color: #ef4444; background: rgba(239,68,68,0.1); }
    .choice-card.disabled { pointer-events: none; opacity: 0.7; }
    .choice-card.disabled.selected { opacity: 1; }
    .choice-card.disabled.correct { opacity: 1; }

    /* Step indicator */
    .step-dot { transition: all 0.3s ease; }
    .step-dot.active { background: #3b82f6; transform: scale(1.15); }
    .step-dot.done { background: #22c55e; }
    .step-line { transition: background 0.3s ease; }
    .step-line.done { background: #22c55e; }

    /* Animations */
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
  </style>
</head>
<body class="text-gray-100">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Back link -->
    <a href="index.html" class="inline-flex items-center gap-1 text-slate-400 hover:text-white text-sm mb-6 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Back to Topics
    </a>

    <!-- Topic header -->
    <div id="topic-header" class="mb-6"></div>

    <!-- Step progress bar -->
    <div id="stepper" class="mb-8"></div>

    <!-- Main content area -->
    <div id="main-content" class="bg-slate-800/50 backdrop-blur border border-slate-700/50 rounded-2xl p-6 md:p-8 min-h-[400px]">
      <div id="loading" class="flex items-center justify-center py-20 text-slate-500">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-2 border-blue-400 border-t-transparent mr-3"></div>
        Loading...
      </div>
      <div id="content-area" class="hidden fade-in"></div>
    </div>
  </div>

  <script>
  (function() {
    // --- State ---
    var topicId = new URLSearchParams(window.location.search).get('topic');
    if (!topicId) { window.location.href = 'index.html'; return; }

    var manifest = null;
    var quizData = null;
    var allSteps = []; // e.g. [{type:'content',levelIdx:0}, {type:'quiz',levelIdx:0}, ... , {type:'summary'}]
    var currentStep = 0;
    var quizState = {}; // per level: { answers: [{chosen, correct, questionIdx}], currentQ: 0, submitted: false }
    var levelScores = {};

    // --- DOM refs ---
    var headerEl = document.getElementById('topic-header');
    var stepperEl = document.getElementById('stepper');
    var contentArea = document.getElementById('content-area');
    var loadingEl = document.getElementById('loading');

    // --- Load data ---
    var basePath = 'data/topics/' + topicId + '/';
    Promise.all([
      fetch(basePath + 'topic.json').then(function(r) { return r.json(); }),
      fetch(basePath + 'quiz.json').then(function(r) { return r.json(); })
    ]).then(function(results) {
      manifest = results[0];
      quizData = results[1];
      document.title = manifest.icon + ' ' + manifest.title + ' — Readiness Hub';
      init();
    }).catch(function(err) {
      loadingEl.innerHTML = '<span class="text-red-400">Failed to load topic data: ' + err.message + '</span>';
    });

    function init() {
      // Build step list
      manifest.levels.forEach(function(level, i) {
        allSteps.push({ type: 'content', levelIdx: i });
        allSteps.push({ type: 'quiz', levelIdx: i });
      });
      allSteps.push({ type: 'summary' });

      // Render header
      headerEl.innerHTML =
        '<div class="flex items-center gap-3">' +
          '<span class="text-3xl">' + manifest.icon + '</span>' +
          '<h1 class="text-2xl font-bold text-white">' + manifest.title + '</h1>' +
        '</div>';

      // Restore progress
      restoreProgress();

      // Render
      renderStepper();
      renderStep();
    }

    function saveProgress() {
      var data = { step: currentStep, quizState: quizState, levelScores: levelScores };
      try { localStorage.setItem('readiness:' + topicId + ':progress', JSON.stringify(data)); } catch(e){}
    }

    function restoreProgress() {
      try {
        var raw = localStorage.getItem('readiness:' + topicId + ':progress');
        if (raw) {
          var data = JSON.parse(raw);
          currentStep = data.step || 0;
          quizState = data.quizState || {};
          levelScores = data.levelScores || {};
        }
      } catch(e) {}
    }

    // --- Stepper ---
    function renderStepper() {
      var html = '<div class="flex items-center justify-center gap-0 overflow-x-auto pb-2">';
      allSteps.forEach(function(step, i) {
        var label = '';
        if (step.type === 'content') label = manifest.levels[step.levelIdx].id;
        else if (step.type === 'quiz') label = manifest.levels[step.levelIdx].id + ' Quiz';
        else label = 'Summary';

        var cls = 'step-dot';
        if (i < currentStep) cls += ' done';
        else if (i === currentStep) cls += ' active';

        html += '<div class="flex flex-col items-center min-w-[60px]">';
        html += '<div class="' + cls + ' w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold ' +
          (i <= currentStep ? 'text-white' : 'bg-slate-700 text-slate-400') + '">' + (i + 1) + '</div>';
        html += '<span class="text-[10px] mt-1 text-slate-500 text-center whitespace-nowrap">' + label + '</span>';
        html += '</div>';

        if (i < allSteps.length - 1) {
          var lineCls = i < currentStep ? 'step-line done' : 'step-line';
          html += '<div class="' + lineCls + ' h-0.5 w-6 mt-[-14px] ' +
            (i < currentStep ? 'bg-emerald-500' : 'bg-slate-700') + '"></div>';
        }
      });
      html += '</div>';
      stepperEl.innerHTML = html;
    }

    // --- Render current step ---
    function renderStep() {
      loadingEl.classList.add('hidden');
      contentArea.classList.remove('hidden');
      contentArea.className = 'fade-in';
      window.scrollTo({ top: 0, behavior: 'smooth' });
      renderStepper();
      saveProgress();

      var step = allSteps[currentStep];
      if (!step) return;

      if (step.type === 'content') renderContent(step.levelIdx);
      else if (step.type === 'quiz') renderQuiz(step.levelIdx);
      else if (step.type === 'summary') renderSummary();
    }

    // --- Content step ---
    function renderContent(levelIdx) {
      var level = manifest.levels[levelIdx];
      contentArea.innerHTML = '<div class="text-center py-10 text-slate-500"><div class="inline-block animate-spin rounded-full h-6 w-6 border-2 border-blue-400 border-t-transparent"></div></div>';

      fetch(basePath + level.file)
        .then(function(r) { return r.text(); })
        .then(function(md) {
          var html = '<div class="md-content">' + marked.parse(md) + '</div>';
          html += '<div class="mt-8 text-center">';
          html += '<button onclick="window._app.startQuiz()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-semibold transition-colors text-lg shadow-lg shadow-blue-600/20">';
          html += '🧠 Start ' + level.id + ' Quiz</button></div>';
          contentArea.innerHTML = html;
        });
    }

    // --- Quiz step ---
    function renderQuiz(levelIdx) {
      var levelId = manifest.levels[levelIdx].id;
      var questions = quizData[levelId] || [];
      if (!quizState[levelId]) {
        quizState[levelId] = { answers: [], currentQ: 0, done: false };
      }
      var qs = quizState[levelId];

      if (qs.done) {
        renderQuizResults(levelIdx);
        return;
      }

      var q = questions[qs.currentQ];
      if (!q) { qs.done = true; renderQuizResults(levelIdx); return; }

      var answered = qs.answers[qs.currentQ];
      var showResult = answered !== undefined;

      var html = '<div class="mb-2 text-sm text-slate-500">Question ' + (qs.currentQ + 1) + ' of ' + questions.length + '</div>';
      // Progress bar
      html += '<div class="w-full bg-slate-700 rounded-full h-1.5 mb-6"><div class="bg-blue-500 h-1.5 rounded-full transition-all" style="width:' + ((qs.currentQ + (showResult ? 1 : 0)) / questions.length * 100) + '%"></div></div>';

      // Scenario
      html += '<div class="bg-slate-900/60 border border-slate-600/50 rounded-xl p-4 mb-5">';
      html += '<div class="text-xs font-semibold text-amber-400 uppercase mb-2">📋 Scenario</div>';
      html += '<p class="text-slate-300 text-sm leading-relaxed">' + escHtml(q.scenario) + '</p></div>';

      // Question
      html += '<h3 class="text-lg font-semibold text-white mb-4">' + escHtml(q.question) + '</h3>';

      // Choices
      q.choices.forEach(function(choice, ci) {
        var letter = choice.charAt(0);
        var isSelected = answered && answered.chosen === letter;
        var isCorrect = letter === q.correct;
        var cls = 'choice-card border border-slate-600 rounded-xl p-4 mb-3 flex items-start gap-3';
        if (showResult) {
          cls += ' disabled';
          if (isCorrect) cls += ' correct';
          else if (isSelected && !isCorrect) cls += ' incorrect';
        } else if (quizState[levelId]._tempChoice === letter) {
          cls += ' selected';
        }

        var icon = '';
        if (showResult && isCorrect) icon = '<span class="text-emerald-400 text-lg">✅</span>';
        else if (showResult && isSelected && !isCorrect) icon = '<span class="text-red-400 text-lg">❌</span>';

        html += '<div class="' + cls + '" data-letter="' + letter + '" onclick="window._app.selectChoice(\'' + letter + '\')">';
        html += '<div class="flex-shrink-0 w-8 h-8 rounded-lg bg-slate-700 flex items-center justify-center text-sm font-bold text-slate-300">' + letter + '</div>';
        html += '<div class="flex-1 text-sm text-slate-300">' + escHtml(choice.substring(3)) + '</div>';
        if (icon) html += icon;
        html += '</div>';
      });

      if (!showResult) {
        html += '<div class="mt-4 text-center">';
        html += '<button onclick="window._app.submitAnswer()" class="bg-blue-600 hover:bg-blue-500 disabled:opacity-40 disabled:cursor-not-allowed text-white px-6 py-2.5 rounded-xl font-semibold transition-colors" id="submit-btn" ' + (!quizState[levelId]._tempChoice ? 'disabled' : '') + '>Submit Answer</button>';
        html += '</div>';
      } else {
        // Show explanation
        var wasCorrect = answered.chosen === q.correct;
        html += '<div class="mt-5 rounded-xl p-4 border ' + (wasCorrect ? 'bg-emerald-500/10 border-emerald-500/30' : 'bg-red-500/10 border-red-500/30') + '">';
        html += '<div class="font-semibold mb-1 ' + (wasCorrect ? 'text-emerald-400' : 'text-red-400') + '">' + (wasCorrect ? '✅ Correct!' : '❌ Incorrect — Answer: ' + q.correct) + '</div>';
        html += '<p class="text-sm text-slate-300">' + escHtml(q.explanation) + '</p></div>';

        if (q.followup_tip) {
          html += '<div class="mt-3 rounded-xl p-4 bg-amber-500/10 border border-amber-500/30">';
          html += '<div class="text-xs font-semibold text-amber-400 uppercase mb-1">💡 Follow-up Tip</div>';
          html += '<p class="text-sm text-slate-300 font-mono">' + escHtml(q.followup_tip) + '</p></div>';
        }

        var isLast = qs.currentQ >= questions.length - 1;
        html += '<div class="mt-5 text-center">';
        html += '<button onclick="window._app.nextQuestion()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-xl font-semibold transition-colors">';
        html += isLast ? 'View Results →' : 'Next Question →';
        html += '</button></div>';
      }

      contentArea.innerHTML = html;
    }

    // --- Quiz results (per level) ---
    function renderQuizResults(levelIdx) {
      var levelId = manifest.levels[levelIdx].id;
      var questions = quizData[levelId] || [];
      var qs = quizState[levelId];
      var correct = 0;
      qs.answers.forEach(function(a) { if (a && a.chosen === a.correct) correct++; });
      levelScores[levelId] = { correct: correct, total: questions.length };
      saveProgress();

      var pct = Math.round(correct / questions.length * 100);
      var color = pct >= 80 ? 'emerald' : pct >= 50 ? 'amber' : 'red';

      var html = '<div class="text-center py-6 fade-in">';
      html += '<div class="text-5xl mb-3">' + (pct >= 80 ? '🎉' : pct >= 50 ? '📖' : '💪') + '</div>';
      html += '<h2 class="text-2xl font-bold text-white mb-2">' + levelId + ' Quiz Complete</h2>';
      html += '<div class="text-4xl font-bold text-' + color + '-400 mb-1">' + pct + '%</div>';
      html += '<p class="text-slate-400 text-sm">' + correct + ' / ' + questions.length + ' correct</p>';

      var isLastLevel = levelIdx >= manifest.levels.length - 1;
      html += '<div class="mt-6">';
      html += '<button onclick="window._app.goNext()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-semibold transition-colors text-lg">';
      html += isLastLevel ? '📊 View Summary Report' : '📖 Continue to ' + manifest.levels[levelIdx + 1].id + ' →';
      html += '</button></div></div>';

      contentArea.innerHTML = html;
    }

    // --- Summary ---
    function renderSummary() {
      // Calculate overall
      var totalCorrect = 0, totalQuestions = 0;
      var wrongAnswers = [];
      manifest.levels.forEach(function(level) {
        var levelId = level.id;
        var questions = quizData[levelId] || [];
        var qs = quizState[levelId] || { answers: [] };
        questions.forEach(function(q, qi) {
          totalQuestions++;
          var a = qs.answers[qi];
          if (a && a.chosen === a.correct) {
            totalCorrect++;
          } else {
            wrongAnswers.push({
              levelId: levelId,
              scenario: q.scenario,
              question: q.question,
              chosen: a ? a.chosen : '(no answer)',
              correct: q.correct,
              explanation: q.explanation,
              followup_tip: q.followup_tip,
              choices: q.choices
            });
          }
        });
      });

      var overallPct = Math.round(totalCorrect / totalQuestions * 100);
      var now = new Date().toISOString();

      // Save to localStorage
      var saveData = {
        completed: true,
        date: now,
        scores: levelScores,
        wrongAnswers: wrongAnswers
      };
      try { localStorage.setItem('readiness:' + topicId, JSON.stringify(saveData)); } catch(e){}
      try { localStorage.removeItem('readiness:' + topicId + ':progress'); } catch(e){}

      var html = '<div class="fade-in">';
      html += '<div class="text-center mb-8">';
      html += '<div class="text-5xl mb-3">📊</div>';
      html += '<h2 class="text-2xl font-bold text-white mb-1">' + manifest.icon + ' ' + manifest.title + '</h2>';
      html += '<p class="text-sm text-slate-400">Completed: ' + new Date().toLocaleDateString() + '</p>';
      html += '</div>';

      // Overall score
      var oColor = overallPct >= 80 ? 'emerald' : overallPct >= 50 ? 'amber' : 'red';
      html += '<div class="text-center bg-slate-900/60 rounded-xl p-6 mb-6 border border-slate-700">';
      html += '<div class="text-5xl font-bold text-' + oColor + '-400">' + overallPct + '%</div>';
      html += '<p class="text-slate-400">' + totalCorrect + ' / ' + totalQuestions + ' correct</p></div>';

      // Per-level breakdown
      html += '<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">';
      manifest.levels.forEach(function(level) {
        var sc = levelScores[level.id] || { correct: 0, total: 0 };
        var lPct = sc.total > 0 ? Math.round(sc.correct / sc.total * 100) : 0;
        var lColor = lPct >= 80 ? 'emerald' : lPct >= 50 ? 'amber' : 'red';
        html += '<div class="bg-slate-900/40 rounded-xl p-4 border border-slate-700 text-center">';
        html += '<div class="text-sm font-semibold text-slate-300 mb-1">' + level.id + ': ' + level.title + '</div>';
        html += '<div class="text-2xl font-bold text-' + lColor + '-400">' + lPct + '%</div>';
        html += '<div class="text-xs text-slate-500">' + sc.correct + '/' + sc.total + ' · ~' + level.estimatedMinutes + ' min</div>';
        html += '</div>';
      });
      html += '</div>';

      // Wrong answers
      if (wrongAnswers.length > 0) {
        html += '<h3 class="text-lg font-semibold text-white mb-4">❌ Review Incorrect Answers</h3>';
        wrongAnswers.forEach(function(wa, i) {
          var chosenText = '(no answer)';
          var correctText = '';
          wa.choices.forEach(function(c) {
            if (c.charAt(0) === wa.chosen) chosenText = c;
            if (c.charAt(0) === wa.correct) correctText = c;
          });
          html += '<div class="bg-slate-900/40 border border-red-500/20 rounded-xl p-4 mb-4">';
          html += '<div class="text-xs text-slate-500 mb-2">' + wa.levelId + ' · Question ' + (i + 1) + '</div>';
          html += '<div class="bg-slate-800/50 rounded-lg p-3 mb-3 text-sm text-slate-400">' + escHtml(wa.scenario) + '</div>';
          html += '<p class="text-sm text-white font-medium mb-2">' + escHtml(wa.question) + '</p>';
          html += '<div class="text-sm mb-1"><span class="text-red-400">Your answer:</span> ' + escHtml(chosenText) + '</div>';
          html += '<div class="text-sm mb-2"><span class="text-emerald-400">Correct:</span> ' + escHtml(correctText) + '</div>';
          html += '<div class="text-sm text-slate-400 italic">' + escHtml(wa.explanation) + '</div>';
          html += '</div>';
        });

        // Key takeaways
        var tips = wrongAnswers.filter(function(wa) { return wa.followup_tip; }).map(function(wa) { return wa.followup_tip; });
        if (tips.length > 0) {
          html += '<h3 class="text-lg font-semibold text-white mb-3 mt-8">💡 Key Takeaways</h3>';
          html += '<div class="space-y-2">';
          tips.forEach(function(tip) {
            html += '<div class="bg-amber-500/10 border border-amber-500/20 rounded-lg p-3 text-sm text-slate-300 font-mono">' + escHtml(tip) + '</div>';
          });
          html += '</div>';
        }
      } else {
        html += '<div class="text-center py-6 bg-emerald-500/10 border border-emerald-500/20 rounded-xl">';
        html += '<div class="text-4xl mb-2">🏆</div>';
        html += '<p class="text-emerald-400 font-semibold">Perfect Score! All answers correct.</p></div>';
      }

      // Buttons
      html += '<div class="flex flex-col sm:flex-row gap-3 justify-center mt-8">';
      html += '<button onclick="window._app.retry()" class="bg-slate-700 hover:bg-slate-600 text-white px-6 py-3 rounded-xl font-semibold transition-colors">🔄 Retry</button>';
      html += '<a href="index.html" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl font-semibold transition-colors text-center">📚 Back to Topics</a>';
      html += '</div></div>';

      contentArea.innerHTML = html;
    }

    // --- Helpers ---
    function escHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- Public API for onclick handlers ---
    window._app = {
      startQuiz: function() {
        currentStep++;
        renderStep();
      },
      selectChoice: function(letter) {
        var step = allSteps[currentStep];
        var levelId = manifest.levels[step.levelIdx].id;
        quizState[levelId]._tempChoice = letter;
        renderQuiz(step.levelIdx);
      },
      submitAnswer: function() {
        var step = allSteps[currentStep];
        var levelId = manifest.levels[step.levelIdx].id;
        var qs = quizState[levelId];
        var questions = quizData[levelId] || [];
        var q = questions[qs.currentQ];
        var chosen = qs._tempChoice;
        if (!chosen) return;

        qs.answers[qs.currentQ] = { chosen: chosen, correct: q.correct, questionIdx: qs.currentQ };
        delete qs._tempChoice;
        saveProgress();
        renderQuiz(step.levelIdx);
      },
      nextQuestion: function() {
        var step = allSteps[currentStep];
        var levelId = manifest.levels[step.levelIdx].id;
        var qs = quizState[levelId];
        var questions = quizData[levelId] || [];
        qs.currentQ++;
        if (qs.currentQ >= questions.length) {
          qs.done = true;
        }
        saveProgress();
        renderQuiz(step.levelIdx);
      },
      goNext: function() {
        currentStep++;
        renderStep();
      },
      retry: function() {
        try {
          localStorage.removeItem('readiness:' + topicId);
          localStorage.removeItem('readiness:' + topicId + ':progress');
        } catch(e){}
        currentStep = 0;
        quizState = {};
        levelScores = {};
        renderStep();
      }
    };

  })();
  </script>
</body>
</html>
